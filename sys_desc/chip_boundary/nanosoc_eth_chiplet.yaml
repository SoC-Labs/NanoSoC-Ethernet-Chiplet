# Copyright 2026, SoC Labs (www.soclabs.org)
#
# Chip-boundary spec for the nanoSoC ethernet chiplet.
#
# Declares how the integration top `nanosoc_eth_chiplet` (111 ports, 377 bits)
# is wrapped by the bonded chip `nanosoc_eth_chiplet_chip`:
#   - which inner ports become bonded chip pads (and what pad cell kind),
#   - which inner inputs are tied to a constant inside the wrapper,
#   - which inner outputs are left unconnected (open).
#
# This is EDITABLE, REVIEWABLE data and it is CHECKED. `make chip-boundary` runs
# nanosoc_gen's chip-wrapper backend against the real RTL port list and REFUSES
# to emit if any port is unclassified or if any classified name is not a port.
# An unclassified port used to be silently dropped from the instantiation,
# leaving its inputs floating — Z in simulation, tied 0 by synthesis.
#
# pad_kind vocabulary (see nanosoc_gen lib/chip_boundary/nanosoc_multicore.yaml)
#   input        : pure-input pad     (consumes 1 inner input  -> `in`)
#   output       : pure-output pad    (consumes 1 inner output -> `out`)
#   tristate_out : output + OE pad    (consumes out + oe; floats when disabled)
#   bidir        : in/out/oe triplet  (consumes 3 inner ports, one pad)
#   oe_polarity  : the INNER oe port's assert sense — active_high means "1 drives"
#
# ============================================================================
# DECISIONS THAT ARE NOT MINE TO MAKE, RECORDED HERE SO THEY ARE VISIBLE
# ============================================================================
# 1. `nego_priority_i` is TIED. See the tie block. On a real chiplet it must come
#    from OTP or a die UID, because two dies presenting the same priority have no
#    auto-negotiation tiebreak. Tying it makes `role_strap_i` the ONLY per-die
#    differentiator. That is a deliberate, and reversible, simplification.
# 2. TideChart's `DEVICE_CLASS` parameter defaults to 16'h0001, which its README
#    defines as the value that reliably WINS the root election. Every chiplet
#    therefore boots claiming to be the host complex. That is a PARAMETER, not a
#    port, so this file cannot fix it — override it at the instance.
# 3. `idelay_ref_clk` is tied off: it exists only for the FPGA IDELAYCTRL path
#    (`USE_IDELAY=1`). On ASIC `USE_IDELAY=0` makes the delay element a bit-exact
#    passthrough and the reference clock is dead weight.
# 4. The 13-bit `tl_ewma_credit_o` congestion telemetry is left OPEN. It is worth
#    a debug bus or a register, not thirteen pads.
# 5. The four link-status ports were UNBONDED on 2026-07-16 (50 -> 46 pad cells).
#    All four are already readable over the TideLink config APB at 0x2E03xxxx,
#    which the SWJ-DP reaches independently of CPU state — so the pads bought no
#    visibility the debug port does not already have. See docs/STATUS_REGISTERS.md
#    for the address table and the per-signal rationale in the `opens` list.
#
#    Two bits below are DEAD in the pinned tidelink (3f3de09). Recorded so nobody
#    trusts them. Full detail in docs/STATUS_REGISTERS.md §4 and §5:
#
#    (a) `d2d_reset_o` is TIED LOW BY CONSTRUCTION, and is not a reset — it is
#        Wlink's RX `in_error_state`, one half of a cross-die "my receiver is in
#        error, stop transmitting" backpressure handshake. It cannot assert
#        because the ECC syndrome checker is a DELIBERATE, DOCUMENTED bring-up
#        bypass: WlinkEccSyndrome.v:306-308 hardwires `corrupted = 1'h0` (the
#        Hamming(33,24) decoder mismatches the TX-side ECC polynomial and flagged
#        every header corrupt at 25 MHz, blocking all traffic). With `corrupted`
#        constant, the FSM's ERROR branch is dead code. NOT FIXED: the real fix
#        is a syndrome-polynomial audit against the TX-side ECC RTL with bench
#        re-validation — get it wrong and the link carries no traffic at all.
#        Raised upstream. Note the team already knew ECC detection was dead —
#        axi_chiplet_controller.sv:2549-2550 repurposed the dead ECC counter
#        field to SYNC_DETECTED_COUNTER.
#    (b) `tl_ewma_credit_o` is PERMANENTLY ZERO in the pinned tidelink.
#        tidelink_apb_regs.sv drove `perf_reg_region = apb_region[1:0]` (raw), but
#        perf_reg_write is gated to apb_region 5..7, so region 2'b00 — the only
#        branch that writes perf_enable_r (tidelink_perf.sv:437-440) — was
#        unreachable. perf_enable_r resets to 0 and ewma_q_r only advances under
#        perf_active. The same off-by-one rotated the read mux, so PERF_ID read
#        0x0 too. FIXED on tidelink `main` (branch `fix/perf-region-decode`, with
#        a mutation-verified regression test) and THE PIN NOW CARRIES IT: the
#        register answers at 0x2E0320F8 and PERF_ID at 0x2E0320FC reads
#        0x5046_0100. It still reads 0 until SW enables perf (PERF_CTRL bit[0] at
#        0x2E0320A0) — that is correct behaviour, not the bug. Stays `open` here
#        regardless: 13 bits of telemetry is a register read, not thirteen pads.
# ============================================================================

chip_boundary:
  chip_module:  nanosoc_eth_chiplet_chip
  inner_module: nanosoc_eth_chiplet

  pads:
    # ---- clocks + reset -------------------------------------------------
    # rtc_clk and user_ref_clk are NOT bonded — they share the sys_fclk pad.
    # See the ALIASED CLOCKS block in the ties section.
    clk_rst:
      - { chip_port: sys_fclk,       pad_kind: input, width: 1, in: sys_fclk }        # free-running system clock
      - { chip_port: nrst,           pad_kind: input, width: 1, in: sys_sysresetn }    # external system reset (active low)
      - { chip_port: rmii_ref_clk,   pad_kind: input, width: 1, in: rmii_ref_clk }     # 50 MHz RMII reference

    # ---- die-to-die PHY: the wire to the far die ------------------------
    # Source-synchronous. pad_clk_rx is the far die's forwarded clock and is
    # asynchronous to everything on this die. See docs/PHYSICAL_HANDOFF.md 1.
    d2d_phy:
      - { chip_port: d2d_clk_tx, pad_kind: output, width: 1, out: pad_clk_tx }
      - { chip_port: d2d_tx,     pad_kind: output, width: 8, out: pad_tx }
      - { chip_port: d2d_clk_rx, pad_kind: input,  width: 1, in:  pad_clk_rx }
      - { chip_port: d2d_rx,     pad_kind: input,  width: 8, in:  pad_rx }

    # ---- TideLink I2C sideband (open-drain) -----------------------------
    # `_t` is a Hi-Z enable (1 = float), so the inner oe is ACTIVE LOW.
    d2d_i2c:
      - { chip_port: i2c_scl, pad_kind: bidir, width: 1, in: i2c_scl_i, out: i2c_scl_o, oe: i2c_scl_t, oe_polarity: active_low }
      - { chip_port: i2c_sda, pad_kind: bidir, width: 1, in: i2c_sda_i, out: i2c_sda_o, oe: i2c_sda_t, oe_polarity: active_low }

    # ---- link bring-up straps (per-die) ---------------------------------
    # NONE. All three are TIED — see the STRAPS block in the ties section.
    # role_strap is tied, so firmware owns the per-die role. That is the
    # documented path for this build, not a workaround: NEGO_CFG_RESET = 7'h00
    # (tidelink_top.sv:123, not overridden here) means nego_en = 0 at POR, and
    # axi_chiplet_controller.sv:83 calls that "the proven SW-role_lock path".

    # ---- link status / bring-up observability ---------------------------
    # NONE. All four former status pads are OPEN — every one is already
    # readable over the TideLink config APB at 0x2E03xxxx, which the SWJ-DP can
    # reach independently of CPU state. See docs/STATUS_REGISTERS.md and note 5
    # in the header above.

    # ---- CoreSight SWJ-DP -----------------------------------------------
    # SWD only. JTAG (tdi/tdo/ntrst) is tied/open — dap_swj_enable is already
    # tied 1'b1 below, so SWD is the debug path and the JTAG TAP is unused.
    swd:
      - { chip_port: swd_clk, pad_kind: input,        width: 1, in:  dap_swclktck }
      - { chip_port: swd_dio, pad_kind: bidir,        width: 1, in:  dap_swditms, out: dap_swdo, oe: dap_swdoen, oe_polarity: active_high }

    # ---- DFT -------------------------------------------------------------
    # The scan CHAIN is not bonded: scan_in/out/clk/shift/mode/asyncrst_ctrl are
    # tied or open (see the DFT block in ties). This chip therefore has no scan
    # access. That is a deliberate v1 pad-budget decision, and it is reversible:
    # the ports still exist on the inner RTL, so a later revision can mux the
    # chain onto functional pads without touching nanosoc_eth_chiplet.sv.
    #
    # sys_scanenable / sys_testmode STAY bonded. They are the DFT mode controls
    # rather than the chain itself, and a future muxed chain needs them.
    dft:
      - { chip_port: sys_scanenable,     pad_kind: input,  width: 1, in:  sys_scanenable }
      - { chip_port: sys_testmode,       pad_kind: input,  width: 1, in:  sys_testmode }

    # ---- UARTs -----------------------------------------------------------
    # NONE. Both cores' UARTs are tied/open — see the UART block in ties.
    # There is no console on this chip; bring-up is over SWD + the TideLink
    # config APB (docs/STATUS_REGISTERS.md).

    # ---- ethernet RMII + MDIO -------------------------------------------
    eth:
      - { chip_port: phy_rmii_txd,    pad_kind: output, width: 2, out: rmii_txd }
      - { chip_port: phy_rmii_tx_en,  pad_kind: output, width: 1, out: rmii_tx_en }
      - { chip_port: phy_rmii_rxd,    pad_kind: input,  width: 2, in:  rmii_rxd }
      - { chip_port: phy_rmii_crs_dv, pad_kind: input,  width: 1, in:  rmii_crs_dv }
      - { chip_port: phy_mdc,         pad_kind: output, width: 1, out: mdc_pad_o }
      - { chip_port: mdio,            pad_kind: bidir,  width: 1, in: md_pad_i, out: md_pad_o, oe: md_padoe_o, oe_polarity: active_high }

    # ---- QSPI flash ------------------------------------------------------
    qspi:
      - { chip_port: qspi_sclk, pad_kind: output, width: 1, out: qspi_sclk }
      - { chip_port: qspi_ncs,  pad_kind: output, width: 1, out: qspi_csn }
      - { chip_port: qspi_io,   pad_kind: bidir,  width: 4, in: qspi_io_i, out: qspi_io_o, oe: qspi_io_e, oe_polarity: active_high }

    # ---- PL022 SPI master ------------------------------------------------
    # NONE. Tied/open — see the SPI block in ties. QSPI (above) is the bonded
    # serial-flash path; the PL022 has no off-chip peer on this package.

    # ---- HOSTIO4 host-access link ---------------------------------------
    hostio4:
      - { chip_port: hostio4, pad_kind: bidir, width: 7, in: hostio4_p1_in, out: hostio4_p1_out, oe: hostio4_p1_outen, oe_polarity: active_high }

    # ---- PTP 1PPS --------------------------------------------------------
    # NONE. phc_pps_out is OPEN — see the opens list. This costs the only
    # physical means of observing PTP alignment against a reference; the PHC's
    # captured time is still readable (CAP_SECONDS_LO/HI, CAP_NANOSECONDS).

  # =====================================================================
  # TIED INPUTS — driven to a constant inside the wrapper, NOT bonded.
  # Each is a decision. Reviewable.
  # =====================================================================
  ties:
    # --- FPGA-only IDELAYCTRL reference; ASIC uses USE_IDELAY=0 ---
    - { soc_port: idelay_ref_clk, const: "1'b0" }

    # =================================================================
    # ALIASED CLOCKS — not constants. `const` is emitted VERBATIM into the
    # wrapper's inner instantiation, and sys_fclk is a wrapper port, so these
    # render as `.rtc_clk (sys_fclk)` and share the sys_fclk pad rather than
    # bonding two more. That is the v1 pad-budget decision.
    #
    # This is the ONLY way the spec can express pad sharing: `pads` is 1:1 and
    # there is no alias kind. Recorded here rather than hand-wired in the pad
    # ring, so it stays reviewable and `make chip-boundary` still counts it.
    #
    # WHAT IT COSTS — both are board-sourced in docs/PHYSICAL_HANDOFF.md:22,24:
    #   rtc_clk      : the RTC/PHC now counts off sys_fclk, not a 32.768 MHz
    #                  reference. PTP resolution and drift follow the system
    #                  clock; the PHC increment must be programmed to match.
    #   user_ref_clk : the Wlink PLL reference is no longer independent of
    #                  sys_hclk. The controller's internal CDC still exists and
    #                  is harmless, but the link rate is now tied to the system
    #                  clock and inherits its jitter.
    # Bond them separately if either cost bites.
    # =================================================================
    - { soc_port: rtc_clk,      const: "sys_fclk" }
    - { soc_port: user_ref_clk, const: "sys_fclk" }

    # --- core straps / sideband ---
    - { soc_port: sys_sysresetreq,        const: "1'b0" }   # no external reset requester
    - { soc_port: dap_npotrst,            const: "1'b1" }   # SWJ-DP PoR deasserted (active low)
    - { soc_port: dap_swj_enable,         const: "1'b1" }   # enable SWD on this chiplet
    - { soc_port: network_core_pmuenable, const: "1'b0" }
    - { soc_port: chip_core_pmuenable,    const: "1'b0" }
    - { soc_port: network_core_nmi,       const: "1'b0" }
    - { soc_port: chip_core_nmi,          const: "1'b0" }
    - { soc_port: network_core_rxev,      const: "1'b0" }
    - { soc_port: chip_core_rxev,         const: "1'b0" }

    # =================================================================
    # STRAPS — all three tied. FIRMWARE now owns the per-die role.
    #
    # role_strap_i sets role_effective at POR (axi_chiplet_controller.sv:575),
    # so with it tied 0 BOTH dies boot believing they are master. Firmware must
    # role-lock each die before the link is used. That is the documented path
    # for this build, not a workaround — NEGO_CFG_RESET = 7'h00 means nego_en=0
    # at POR, the autoneg FSM parks in ST_BYPASS (tidelink_autoneg.sv:830), and
    # :83 names nego_en=0 "the proven SW-role_lock / host-winscan path".
    #
    # Bug N7 (identical priority -> identical autoneg backoff -> both time out)
    # is NOT reachable here: it lives in ST_NEGO_WAIT, which needs nego_en=1.
    # If firmware ever enables autoneg it must write NEGO_PRIORITY (0x2E032098)
    # per die FIRST — with both dies tied identical, enabling autoneg without
    # that write reproduces N7 exactly. test_18 covers it.
    #
    # Bond role_strap if you want a die that comes up correctly with no
    # firmware. That is the whole trade.
    # =================================================================
    - { soc_port: role_strap_i,       const: "1'b0" }   # both dies master until SW role-locks
    - { soc_port: mask_hs_bypass_i,   const: "1'b0" }   # 0 = normal; no SW role-lock bypass
    - { soc_port: apb_debug_unlock_i, const: "1'b0" }   # 0 = debug locked

    # --- auto-negotiation priority ---
    # Inert in this build, and left tied for that reason. nego_pri_sel
    # (NEGO_CFG[3:2]) PORs to 0, which selects nego_priority_REG, not this port
    # (tidelink_autoneg.sv:543). Nothing reads it unless firmware writes
    # NEGO_CFG[3:2]=01. A production chiplet would source it from OTP or a die
    # UID via that path; 16 pads is the wrong answer, a fuse bank is the right
    # one.
    - { soc_port: nego_priority_i, const: "16'h0001" }

    # =================================================================
    # JTAG — the TAP is unused; dap_swj_enable is tied 1'b1 (SWD is the path).
    # =================================================================
    - { soc_port: dap_tdi,   const: "1'b0" }
    # ACTIVE LOW. 1'b1 = TAP reset DEASSERTED. Tying this 0 would hold the TAP
    # in permanent reset. Same sense as dap_npotrst above.
    - { soc_port: dap_ntrst, const: "1'b1" }

    # =================================================================
    # DFT — the scan chain is not bonded. Tied inert, NOT deleted: the inner
    # ports remain, so a later revision can mux the chain onto functional pads.
    # sys_scanenable / sys_testmode stay bonded (see the dft pad group).
    # =================================================================
    - { soc_port: scan_mode,          const: "1'b0" }
    - { soc_port: scan_asyncrst_ctrl, const: "1'b0" }
    - { soc_port: scan_clk,           const: "1'b0" }
    - { soc_port: scan_shift,         const: "1'b0" }
    - { soc_port: scan_in,            const: "1'b0" }

    # =================================================================
    # UARTs — no console on this chip.
    # ACTIVE HIGH IDLE. A UART line idles at 1. Tying RXD to 0 presents a
    # permanent start-bit / break condition to the receiver, which some UART
    # cores latch as a framing error. 1'b1 is the idle-line value.
    # =================================================================
    - { soc_port: uart_rxd,           const: "1'b1" }
    - { soc_port: chip_core_uart_rxd, const: "1'b1" }

    # =================================================================
    # PL022 SPI — no off-chip peer. MISO reads as a constant 0.
    # =================================================================
    - { soc_port: spi_miso, const: "1'b0" }

    # --- TideChart PUF sampler: not enabled in v1 ---
    - { soc_port: puf_seed,  const: "16'h0000" }
    - { soc_port: puf_ready, const: "1'b0" }

    # --- eth_ss_0: the SoC's external AHB test slave, held idle ---
    # haddr/hwdata are SYS_ADDR_W/SYS_DATA_W wide (both 32). The wrapper has no
    # access to the inner module's parameters, so the constants must be
    # self-contained sized literals.
    - { soc_port: eth_ss_0_htrans,    const: "2'b00" }      # IDLE transfer
    - { soc_port: eth_ss_0_haddr,     const: "32'd0" }
    - { soc_port: eth_ss_0_hwrite,    const: "1'b0" }
    - { soc_port: eth_ss_0_hsize,     const: "3'b000" }
    - { soc_port: eth_ss_0_hburst,    const: "3'b000" }
    - { soc_port: eth_ss_0_hprot,     const: "4'b0000" }
    - { soc_port: eth_ss_0_hwdata,    const: "32'd0" }
    - { soc_port: eth_ss_0_hmastlock, const: "1'b0" }

  # =====================================================================
  # OPEN OUTPUTS — left unconnected. Reviewable.
  # =====================================================================
  opens:
    # --- clock/reset observation (generated inside; nothing off-chip needs them) ---
    - sys_poresetn
    - sys_hclk
    - sys_hresetn

    # --- JTAG TAP outputs: the TAP is unused (SWD is the debug path) ---
    - dap_tdo
    - dap_ntdoen

    # --- scan chain output: the chain is not bonded. See the DFT ties. ---
    - scan_out

    # --- UART transmit: no console on this chip ---
    - uart_txd
    - chip_core_uart_txd

    # --- PL022 SPI outputs: no off-chip peer ---
    - spi_sclk
    - spi_mosi
    - spi_ss                 # [2:0]

    # --- PTP 1PPS: the only physical view of PTP alignment, given up for the
    #     pad budget. Captured time stays readable over the PHC registers. ---
    - phc_pps_out

    # --- eth_ss_0 responses: nothing drives that port ---
    - eth_ss_0_hrdata
    - eth_ss_0_hready
    - eth_ss_0_hresp

    # --- CPU0 (network_core) status ---
    - network_core_txev
    - network_core_lockup
    - network_core_sysresetreq
    - network_core_sleeping
    - network_core_sleepdeep

    # --- CPU1 (chip_core) status ---
    - chip_core_txev
    - chip_core_lockup
    - chip_core_sysresetreq
    - chip_core_sleeping
    - chip_core_sleepdeep
    - chip_core_wdog_reset

    # --- interrupts already routed INTERNALLY (to a CPU's NVIC); these copies
    #     exist for observability only ---
    - eth_irq
    - phc_pps_irq
    - phc_alarm_irq
    - tidechart_irq_o

    # --- RTC / PTP telemetry: 81 bits of time. A register read, not pads. ---
    - rtc_time_ptp_ns        # [31:0]
    - rtc_time_ptp_sec       # [47:0]
    - rtc_time_one_pps

    # --- servo lock status ---
    # ha1588_servo_locked is the ETHERNET servo. servo_locked_o is TIDELINK's.
    # The PHC reports only one of them regardless of SERVO_CTRL.SRC_SEL — see
    # docs/PHYSICAL_HANDOFF.md 4.4. Neither is trustworthy enough to bond yet.
    - ha1588_servo_locked
    - servo_locked_o

    # --- congestion telemetry: 13 bits, wants a debug bus not pads ---
    # Also PERMANENTLY ZERO today — see note 5 below and docs/STATUS_REGISTERS.md.
    - tl_ewma_credit_o

    # --- link status / observability: all four are register-readable ---
    # Unbonded 2026-07-16. Every one of these is already a bit in the TideLink
    # config APB at 0x2E03xxxx (docs/STATUS_REGISTERS.md), a window the SWJ-DP
    # reaches on free-running SYS_HCLK regardless of CPU state, and which is NOT
    # gated by link_active (only the TX aperture is). Per-signal rationale:
    #
    #   link_active_o    — NOT independent status: tidelink_top.sv:2308 is
    #                      `assign link_active = role_locked_o;`. Same net as
    #                      role_locked_o. Two pads carried one bit.
    #                      (It also gates the TX aperture, but that path is
    #                      internal — tc_link_active -> u_d2d_decode — and is
    #                      unaffected by unbonding the pad.)
    #   role_is_master_o — role_status[0] @ 0x2E032084, INVERTED (0 = master).
    #   role_locked_o    — role_status[1] @ 0x2E032084.
    #   d2d_reset_o      — TIED LOW BY CONSTRUCTION; see note 5.
    #
    # KNOWN GAP, accepted: a die strapped dap_swj_enable=0 (a non-active die in
    # a multi-chiplet package) has no SWD, so with its link down it has no
    # link-status visibility at all. Not a concern while chip.v ties
    # dap_swj_enable=1'b1. Revisit if a package strapped 0 is ever built.
    - link_active_o
    - role_is_master_o
    - role_locked_o
    - d2d_reset_o
